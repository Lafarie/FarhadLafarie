<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none">
  <!-- Color Gradients & Filters -->
  <defs>
    <radialGradient id="devops-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2fd6a6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2fd6a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="helm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2fd6a6"/>
      <stop offset="100%" stop-color="#148062"/>
    </linearGradient>
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2b3b38"/>
      <stop offset="100%" stop-color="#182422"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Neo-Brutalist Card Background -->
  <rect width="320" height="400" rx="24" fill="#12201e"/>
  <rect x="2" y="2" width="316" height="396" rx="22" stroke="#2fd6a6" stroke-width="1.5" opacity="0.2"/>

  <!-- Sketchy Technical Grid Background -->
  <g stroke="#1a2e2a" stroke-width="1" stroke-dasharray="3 6">
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    
    <line x1="0" y1="50" x2="320" y2="50"/>
    <line x1="0" y1="100" x2="320" y2="100"/>
    <line x1="0" y1="150" x2="320" y2="150"/>
    <line x1="0" y1="200" x2="320" y2="200"/>
    <line x1="0" y1="250" x2="320" y2="250"/>
    <line x1="0" y1="300" x2="320" y2="300"/>
    <line x1="0" y1="350" x2="320" y2="350"/>
  </g>

  <!-- Technical Corner Crosshairs (Neo-Brutalist markers) -->
  <g stroke="#2fd6a6" stroke-width="1.5" opacity="0.4">
    <path d="M16 16 H36 M16 16 V36"/>
    <path d="M304 16 H284 M304 16 V36"/>
    <path d="M16 384 H36 M16 384 V364"/>
    <path d="M304 384 H284 M304 384 V364"/>
  </g>

  <!-- Circular Radar / Focus Rings -->
  <circle cx="160" cy="190" r="130" stroke="#2fd6a6" stroke-width="0.75" stroke-dasharray="1 5" opacity="0.3"/>
  <circle cx="160" cy="190" r="100" stroke="#2fd6a6" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.2"/>
  <circle cx="160" cy="190" r="75" fill="url(#devops-glow)"/>

  <!-- ================= BACKGROUND ELEMENTS ================= -->

  <!-- Top-Left Sketchy Deploy Cloud -->
  <g opacity="0.8">
    <path d="M 50,115 C 50,103 62,95 72,95 C 76,80 94,75 106,85 C 118,80 130,90 128,103 C 138,105 142,118 132,126 C 122,132 50,132 50,115 Z" fill="#172b27" stroke="#2fd6a6" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 54,118 C 54,107 65,99 75,99 C 79,85 95,80 106,89 C 117,85 128,94 126,106" fill="none" stroke="#2fd6a6" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
    <!-- Lightning bolt/pipeline connection -->
    <path d="M 90,126 L 82,142 H 94 L 88,158" stroke="#ffbe0b" stroke-width="2" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- Top-Right Kubernetes/Helm Orchestration Wheel -->
  <g transform="translate(240, 95)" filter="url(#shadow)">
    <!-- Outer dashed guide -->
    <circle cx="0" cy="0" r="26" stroke="#2fd6a6" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" fill="none"/>
    <!-- Main wheel shape -->
    <circle cx="0" cy="0" r="18" stroke="#2fd6a6" stroke-width="2.5" fill="#172b27"/>
    <circle cx="0" cy="0" r="6" fill="#2fd6a6"/>
    <!-- Spoke handles (7 spokes of K8s wheel) -->
    <g stroke="#2fd6a6" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-18" x2="0" y2="-25"/>
      <line x1="16.2" y1="-7.8" x2="22.5" y2="-10.8"/>
      <line x1="12.6" y1="12.6" x2="17.5" y2="17.5"/>
      <line x1="-7.8" y1="16.2" x2="-10.8" y2="22.5"/>
      <line x1="-18" y1="0" x2="-25" y2="0"/>
      <line x1="-12.6" y1="-12.6" x2="-17.5" y2="-17.5"/>
      <line x1="16.2" y1="7.8" x2="22.5" y2="10.8"/>
    </g>
  </g>

  <!-- ================= INFINITY PIPELINE ================= -->
  <!-- We draw two overlapping paths to create a beautiful hand-drawn overlapping effect -->
  <g filter="url(#shadow)">
    <!-- Outer Glow Underlay -->
    <path d="M 160,200 C 100,130 45,150 45,200 C 45,250 100,270 160,200 C 220,130 275,150 275,200 C 275,250 220,270 160,200 Z" fill="none" stroke="#2fd6a6" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
    <!-- Main Pipeline Track -->
    <path id="pipeline-track" d="M 160,200 C 100,130 45,150 45,200 C 45,250 100,270 160,200 C 220,130 275,150 275,200 C 275,250 220,270 160,200 Z" fill="none" stroke="#2fd6a6" stroke-width="5" stroke-linecap="round"/>
    <!-- Inner Sketch Line -->
    <path d="M 162,201 C 102,132 47,152 47,201 C 47,249 101,268 160,201 C 219,132 273,152 273,201 C 273,249 219,268 162,201 Z" fill="none" stroke="#12201e" stroke-width="1" opacity="0.8"/>
    <path d="M 158,199 C 98,128 43,148 43,199 C 43,251 99,272 160,199 C 221,128 277,148 277,199 C 277,251 221,272 158,199 Z" fill="none" stroke="#958aa8" stroke-width="0.75" stroke-dasharray="3 3" opacity="0.6"/>

    <!-- Pipeline Stage Nodes -->
    <!-- Plan / Code (Left) -->
    <g transform="translate(45, 200)">
      <circle cx="0" cy="0" r="7" fill="#ffbe0b" stroke="#12201e" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="11" stroke="#ffbe0b" stroke-width="1" fill="none" opacity="0.5"/>
    </g>
    <!-- Build / Test (Top Left) -->
    <circle cx="95" cy="165" r="4.5" fill="#2fd6a6" stroke="#12201e" stroke-width="1"/>
    <!-- Release (Bottom Left) -->
    <circle cx="95" cy="235" r="4.5" fill="#2fd6a6" stroke="#12201e" stroke-width="1"/>
    
    <!-- Deploy (Right) -->
    <g transform="translate(275, 200)">
      <circle cx="0" cy="0" r="7" fill="#2fd6a6" stroke="#12201e" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="11" stroke="#2fd6a6" stroke-width="1" fill="none" opacity="0.5"/>
    </g>
    <!-- Monitor (Top Right) -->
    <circle cx="225" cy="165" r="4.5" fill="#2fd6a6" stroke="#12201e" stroke-width="1"/>
    <!-- Operate (Bottom Right) -->
    <circle cx="225" cy="235" r="4.5" fill="#2fd6a6" stroke="#12201e" stroke-width="1"/>
  </g>

  <!-- ================= AVATAR / CHARACTER ================= -->
  <g filter="url(#shadow)">
    <!-- Shoulders / Jacket -->
    <path d="M 105,250 C 105,200 215,200 215,250 L 235,320 H 85 Z" fill="url(#avatar-grad)" stroke="#2fd6a6" stroke-width="2"/>
    <!-- Fluorescent safety vest lines (DevOps flavor) -->
    <path d="M 125,230 L 138,320" stroke="#2fd6a6" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M 195,230 L 182,320" stroke="#2fd6a6" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M 90,290 H 230" stroke="#2fd6a6" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Under-outlines for sketchy feel -->
    <path d="M 103,248 C 103,198 217,198 217,248" fill="none" stroke="#958aa8" stroke-width="1" opacity="0.5"/>
    
    <!-- Neck -->
    <rect x="146" y="180" width="28" height="25" fill="#e4dce8" stroke="#2fd6a6" stroke-width="1.5"/>
    
    <!-- Head -->
    <circle cx="160" cy="155" r="32" fill="#fcf9ff" stroke="#2fd6a6" stroke-width="2"/>
    <circle cx="160" cy="155" r="32" fill="#c4b8d4" opacity="0.15"/>
    
    <!-- Cyber Visor / Tech Glasses -->
    <rect x="134" y="146" width="52" height="15" rx="5" fill="#12201e" stroke="#2fd6a6" stroke-width="2"/>
    <path d="M 139,153 H 181" stroke="#2fd6a6" stroke-width="1.5" opacity="0.8"/>
    <!-- Visor reflections -->
    <line x1="142" y1="149" x2="147" y2="157" stroke="#fff" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="147" y1="149" x2="150" y2="154" stroke="#fff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

    <!-- Safety Helmet -->
    <!-- Base dome -->
    <path d="M 120,135 C 117,105 203,105 200,135 Z" fill="url(#helm-grad)" stroke="#12201e" stroke-width="2"/>
    <!-- Helmet rim -->
    <path d="M 112,132 C 130,136 190,136 208,132 L 212,138 C 190,142 130,142 108,138 Z" fill="#2fd6a6" stroke="#12201e" stroke-width="1.5"/>
    <!-- Helmet ridge center stripe -->
    <path d="M 160,105 C 162,115 162,125 160,134" stroke="#12201e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Small helmet status lamp -->
    <circle cx="160" cy="116" r="4.5" fill="#fff" stroke="#12201e" stroke-width="1.5"/>
    <circle cx="160" cy="116" r="8" stroke="#ffbe0b" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- ================= FOREGROUND / DOCKER BOXES ================= -->
  
  <!-- Left Docker Cube -->
  <g transform="translate(40, 275)" filter="url(#shadow)">
    <!-- Top Face -->
    <polygon points="40,20 65,32.5 40,45 15,32.5" fill="#2fd6a6" fill-opacity="0.85" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <!-- Left Face -->
    <polygon points="15,32.5 40,45 40,70 15,57.5" fill="#148062" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <!-- Right Face -->
    <polygon points="40,45 65,32.5 65,57.5 40,70" fill="#0b4d3a" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <!-- Overlay sketch line (offset) -->
    <polygon points="16,33.5 39,44 39,68 16,56.5" fill="none" stroke="#2fd6a6" stroke-width="0.75" opacity="0.6"/>
    <!-- Logo stamp on the container side (like Git/Docker lines) -->
    <line x1="25" y1="47" x2="33" y2="43" stroke="#2fd6a6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="52" x2="33" y2="48" stroke="#2fd6a6" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Right Docker Cubes Stacked -->
  <!-- Bottom Right Cube -->
  <g transform="translate(210, 305)" filter="url(#shadow)">
    <polygon points="40,20 65,32.5 40,45 15,32.5" fill="#1e3d37" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="15,32.5 40,45 40,70 15,57.5" fill="#14322c" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="40,45 65,32.5 65,57.5 40,70" fill="#0d2420" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <line x1="25" y1="47" x2="33" y2="43" stroke="#2fd6a6" stroke-width="1" opacity="0.4"/>
    <line x1="25" y1="52" x2="33" y2="48" stroke="#2fd6a6" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Top Right Cube (Stacked) -->
  <g transform="translate(210, 270)" filter="url(#shadow)">
    <polygon points="40,20 65,32.5 40,45 15,32.5" fill="#2fd6a6" fill-opacity="0.9" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="15,32.5 40,45 40,70 15,57.5" fill="#148062" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="40,45 65,32.5 65,57.5 40,70" fill="#0b4d3a" stroke="#12201e" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="16,33.5 39,44 39,68 16,56.5" fill="none" stroke="#2fd6a6" stroke-width="0.75" opacity="0.6"/>
    <!-- Logo stamp -->
    <line x1="25" y1="47" x2="33" y2="43" stroke="#2fd6a6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="52" x2="33" y2="48" stroke="#2fd6a6" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ================= LABELS & TEXT ================= -->
  <!-- DevOps Label text -->
  <text x="160" y="375" text-anchor="middle" fill="#2fd6a6" font-family="monospace" font-size="13" font-weight="900" letter-spacing="5">DEVOPS &amp; INFRA</text>
  <text x="160" y="387" text-anchor="middle" fill="#958aa8" font-family="sans-serif" font-size="9" opacity="0.7" letter-spacing="1">SHIPPED WITH CARE</text>

  <!-- Small labels for the pipeline -->
  <text x="45" y="180" text-anchor="middle" fill="#958aa8" font-family="sans-serif" font-size="8" font-weight="bold" opacity="0.8">CODE</text>
  <text x="95" y="152" text-anchor="middle" fill="#958aa8" font-family="sans-serif" font-size="8" font-weight="bold" opacity="0.8">BUILD</text>
  <text x="225" y="152" text-anchor="middle" fill="#958aa8" font-family="sans-serif" font-size="8" font-weight="bold" opacity="0.8">TEST</text>
  <text x="275" y="180" text-anchor="middle" fill="#958aa8" font-family="sans-serif" font-size="8" font-weight="bold" opacity="0.8">DEPLOY</text>
  <text x="160" y="235" text-anchor="middle" fill="#2fd6a6" font-family="monospace" font-size="9" font-weight="bold" opacity="0.9">CI/CD</text>

</svg>
