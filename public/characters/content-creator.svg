<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none">
  <!-- Color Gradients & Filters -->
  <defs>
    <radialGradient id="creator-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="creator-shirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4e2b25"/>
      <stop offset="100%" stop-color="#22110e"/>
    </linearGradient>
    <linearGradient id="lens-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbe0b"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Neo-Brutalist Card Background -->
  <rect width="320" height="400" rx="24" fill="#261a18"/>
  <rect x="2" y="2" width="316" height="396" rx="22" stroke="#ff6b9d" stroke-width="1.5" opacity="0.2"/>

  <!-- Technical Grid Background -->
  <g stroke="#3d2824" stroke-width="1" stroke-dasharray="3 6">
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    
    <line x1="0" y1="50" x2="320" y2="50"/>
    <line x1="0" y1="100" x2="320" y2="100"/>
    <line x1="0" y1="150" x2="320" y2="150"/>
    <line x1="0" y1="200" x2="320" y2="200"/>
    <line x1="0" y1="250" x2="320" y2="250"/>
    <line x1="0" y1="300" x2="320" y2="300"/>
    <line x1="0" y1="350" x2="320" y2="350"/>
  </g>

  <!-- Corner Crosshairs -->
  <g stroke="#ff6b9d" stroke-width="1.5" opacity="0.4">
    <path d="M16 16 H36 M16 16 V36"/>
    <path d="M304 16 H284 M304 16 V36"/>
    <path d="M16 384 H36 M16 384 V364"/>
    <path d="M304 384 H284 M304 384 V364"/>
  </g>

  <!-- Central Glow / Focus Rings -->
  <circle cx="160" cy="180" r="120" fill="url(#creator-glow)"/>
  <circle cx="160" cy="180" r="100" stroke="#ff6b9d" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- ================= BACKGROUND FLOATING ELEMENTS ================= -->
  
  <!-- Floating Sparkle 1 (Top Left) -->
  <g transform="translate(55, 90)" fill="#ffbe0b" opacity="0.8">
    <path d="M 0,-15 Q 0,0 -15,0 Q 0,0 0,15 Q 0,0 15,0 Q 0,0 0,-15 Z"/>
  </g>
  
  <!-- Floating Sparkle 2 (Top Right) -->
  <g transform="translate(245, 85)" fill="#ff6b9d" opacity="0.8">
    <path d="M 0,-15 Q 0,0 -15,0 Q 0,0 0,15 Q 0,0 15,0 Q 0,0 0,-15 Z"/>
  </g>

  <!-- Soundwaves radiating out (Right side) -->
  <g stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M 270,140 Q 285,150 280,165" stroke="#ff6b9d" stroke-width="2"/>
    <path d="M 280,130 Q 300,150 292,175" stroke="#ffbe0b" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Floating Audio Play Node (Top center right) -->
  <g transform="translate(265, 200)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="16" fill="#0f0b14" stroke="#ffbe0b" stroke-width="1.5"/>
    <polygon points="-4,-7 8,0 -4,7" fill="#ffbe0b"/>
  </g>

  <!-- Compact Camera / Gear (Left Desk/Midground) -->
  <g transform="translate(35, 185)" filter="url(#shadow)">
    <!-- Camera Body -->
    <rect x="0" y="8" width="46" height="32" rx="6" fill="#0f0b14" stroke="#ff6b9d" stroke-width="2" stroke-linejoin="round"/>
    <!-- Flash block -->
    <rect x="8" y="2" width="12" height="6" rx="1.5" fill="#ffbe0b"/>
    <!-- Top Dial -->
    <rect x="28" y="4" width="8" height="4" rx="1" fill="#ff6b9d"/>
    <!-- Lens outer -->
    <circle cx="23" cy="24" r="13" fill="#261a18" stroke="#ff6b9d" stroke-width="2"/>
    <!-- Lens inner reflection -->
    <circle cx="23" cy="24" r="7" fill="url(#lens-grad)"/>
    <circle cx="20" cy="21" r="2" fill="#fff" opacity="0.8"/>
  </g>

  <!-- Podcast Studio Microphone (Bottom Left Desk) -->
  <g transform="translate(50, 290)" filter="url(#shadow)">
    <!-- Stand Base -->
    <path d="M 10,40 H 40" stroke="#ffbe0b" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="25" y1="40" x2="25" y2="22" stroke="#ffbe0b" stroke-width="3.5"/>
    <!-- U-shaped Mount -->
    <path d="M 12,18 C 12,32 38,32 38,18" fill="none" stroke="#ffbe0b" stroke-width="2.5"/>
    <!-- Microphone Capsule -->
    <rect x="18" y="2" width="14" height="24" rx="7" fill="#0f0b14" stroke="#ffbe0b" stroke-width="2.5"/>
    <!-- Grille lines -->
    <rect x="20" y="4" width="10" height="9" fill="#ffbe0b" opacity="0.8"/>
    <line x1="18" y1="13" x2="32" y2="13" stroke="#ffbe0b" stroke-width="2"/>
    <!-- Pop Filter / Glow circle behind -->
    <circle cx="25" cy="14" r="16" stroke="#ffbe0b" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.3" fill="none"/>
  </g>

  <!-- ================= AVATAR / CHARACTER ================= -->
  <g filter="url(#shadow)">
    <!-- Shoulders/Shirt -->
    <path d="M 105,235 C 105,190 215,190 215,235 L 235,310 H 85 Z" fill="url(#creator-shirt)" stroke="#ff6b9d" stroke-width="2"/>
    <!-- Scarf or stylish collar -->
    <path d="M 125,215 Q 160,240 195,215" stroke="#ff6b9d" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Spark / Creativity pin on shirt -->
    <polygon points="122,255 125,258 122,261 119,258" fill="#ffbe0b"/>

    <!-- Neck -->
    <rect x="146" y="172" width="28" height="20" fill="#fcf9ff" stroke="#ff6b9d" stroke-width="1.5"/>
    
    <!-- Head -->
    <circle cx="160" cy="148" r="32" fill="#fffdf8" stroke="#ff6b9d" stroke-width="2"/>
    <circle cx="160" cy="148" r="32" fill="#ffbe0b" opacity="0.12"/>
    
    <!-- Cool Creator Glasses (Circular frames) -->
    <circle cx="145" cy="146" r="12" fill="none" stroke="#ffbe0b" stroke-width="2.5"/>
    <circle cx="175" cy="146" r="12" fill="none" stroke="#ffbe0b" stroke-width="2.5"/>
    <path d="M 157,146 H 163" stroke="#ffbe0b" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Glass glare -->
    <line x1="140" y1="141" x2="147" y2="149" stroke="#fff" stroke-width="1.5" opacity="0.75" stroke-linecap="round"/>
    <line x1="170" y1="141" x2="177" y2="149" stroke="#fff" stroke-width="1.5" opacity="0.75" stroke-linecap="round"/>
  </g>

  <!-- ================= FOREGROUND VIDEO EDITOR ================= -->
  
  <!-- Desk Base Line -->
  <line x1="20" y1="320" x2="300" y2="320" stroke="#ff6b9d" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Video Editor Screen -->
  <g filter="url(#shadow)">
    <!-- Screen Bezels -->
    <rect x="110" y="210" width="160" height="105" rx="10" fill="#0f0b14" stroke="#ff6b9d" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Screen Display Area -->
    <rect x="115" y="215" width="150" height="95" rx="6" fill="#1b1210"/>
    
    <!-- Window Header -->
    <line x1="115" y1="227" x2="265" y2="227" stroke="#3d2824" stroke-width="1.5"/>
    <circle cx="122" cy="221" r="2.5" fill="#ff6b9d"/>
    <circle cx="129" cy="221" r="2.5" fill="#ffbe0b"/>
    <circle cx="136" cy="221" r="2.5" fill="#2fd6a6"/>
    <text x="195" y="223" text-anchor="middle" fill="#c4b8d4" font-family="monospace" font-size="7" opacity="0.6">Timeline_v1</text>

    <!-- Video Preview Box inside Screen -->
    <rect x="120" y="232" width="60" height="36" rx="4" fill="#0f0b14" stroke="#ffbe0b" stroke-width="1.5"/>
    <!-- Movie/landscape sketch in preview -->
    <polygon points="125,260 135,248 145,255 155,242 175,260" fill="#ff6b9d" opacity="0.2"/>
    <circle cx="162" cy="242" r="3" fill="#ffbe0b"/>

    <!-- Track timeline layout -->
    <!-- Video Track 1 (Pink Blocks) -->
    <rect x="186" y="232" width="35" height="7" rx="1.5" fill="#ff6b9d" opacity="0.9"/>
    <rect x="224" y="232" width="36" height="7" rx="1.5" fill="#ffbe0b" opacity="0.9"/>
    
    <!-- Audio Track 2 (Soundwave representation) -->
    <rect x="186" y="243" width="74" height="12" rx="3" fill="#0f0b14"/>
    <path d="M 190,249 L 193,245 L 196,253 L 199,247 L 202,251 L 205,244 L 208,254 L 211,249 L 214,249 L 217,252 L 220,246 L 223,250 L 226,245 L 229,251 L 232,248 L 235,253 L 238,247 L 241,250 L 244,249 L 247,251 L 250,246 L 253,253 M 190,249 H 255" stroke="#2fd6a6" stroke-width="1" fill="none"/>

    <!-- Track 3 (Subtitle Blocks) -->
    <rect x="120" y="274" width="28" height="4" rx="1" fill="#c4b8d4"/>
    <rect x="151" y="274" width="38" height="4" rx="1" fill="#c4b8d4"/>
    <rect x="194" y="274" width="45" height="4" rx="1" fill="#c4b8d4"/>
    
    <!-- Playhead vertical line -->
    <line x1="210" y1="228" x2="210" y2="295" stroke="#ffbe0b" stroke-width="1.5" stroke-dasharray="2 2"/>
    <polygon points="206,228 214,228 210,232" fill="#ffbe0b"/>

    <!-- Screen Bottom Controls -->
    <rect x="120" y="284" width="140" height="18" rx="3" fill="#0f0b14"/>
    <!-- Small play button icon in controls -->
    <polygon points="187,290 193,293 187,296" fill="#ffbe0b"/>
    <!-- Small bar markers -->
    <line x1="125" y1="293" x2="160" y2="293" stroke="#ff6b9d" stroke-width="2"/>
    <circle cx="160" cy="293" r="2.5" fill="#ff6b9d"/>
  </g>

  <!-- ================= LABELS & TEXT ================= -->
  <!-- Content Creator Label text -->
  <text x="160" y="375" text-anchor="middle" fill="#ff6b9d" font-family="monospace" font-size="13" font-weight="900" letter-spacing="4">CONTENT CREATOR</text>
  <text x="160" y="387" text-anchor="middle" fill="#ffbe0b" font-family="sans-serif" font-size="9" opacity="0.7" letter-spacing="1">STORIES &amp; VISUALS THAT CONNECT</text>

</svg>
