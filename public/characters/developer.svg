<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none">
  <!-- Color Gradients & Filters -->
  <defs>
    <radialGradient id="dev-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b4dc4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b4dc4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hoodie-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1f3c"/>
      <stop offset="100%" stop-color="#120c1e"/>
    </linearGradient>
    <linearGradient id="screen-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b4dc4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2fd6a6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Neo-Brutalist Card Background -->
  <rect width="320" height="400" rx="24" fill="#1a1326"/>
  <rect x="2" y="2" width="316" height="396" rx="22" stroke="#8b4dc4" stroke-width="1.5" opacity="0.2"/>

  <!-- Technical Grid Background -->
  <g stroke="#271e38" stroke-width="1" stroke-dasharray="3 6">
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    
    <line x1="0" y1="50" x2="320" y2="50"/>
    <line x1="0" y1="100" x2="320" y2="100"/>
    <line x1="0" y1="150" x2="320" y2="150"/>
    <line x1="0" y1="200" x2="320" y2="200"/>
    <line x1="0" y1="250" x2="320" y2="250"/>
    <line x1="0" y1="300" x2="320" y2="300"/>
    <line x1="0" y1="350" x2="320" y2="350"/>
  </g>

  <!-- Corner Crosshairs -->
  <g stroke="#8b4dc4" stroke-width="1.5" opacity="0.4">
    <path d="M16 16 H36 M16 16 V36"/>
    <path d="M304 16 H284 M304 16 V36"/>
    <path d="M16 384 H36 M16 384 V364"/>
    <path d="M304 384 H284 M304 384 V364"/>
  </g>

  <!-- Central Glow / Focus Rings -->
  <circle cx="160" cy="180" r="120" fill="url(#dev-glow)"/>
  <circle cx="160" cy="180" r="100" stroke="#8b4dc4" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- ================= BACKGROUND FLOATING ELEMENTS ================= -->
  
  <!-- Floating React Atom (Top Left) -->
  <g transform="translate(55, 90)" stroke="#8b4dc4" stroke-width="1.5" fill="none" opacity="0.75">
    <ellipse cx="0" cy="0" rx="18" ry="6" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="18" ry="6" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="18" ry="6" transform="rotate(90)"/>
    <circle cx="0" cy="0" r="3" fill="#8b4dc4"/>
  </g>
  
  <!-- Floating Code Brackets / Binary (Top Right) -->
  <g transform="translate(245, 90)" opacity="0.7">
    <!-- Sketchy curly brace -->
    <text x="0" y="0" fill="#c4b8d4" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">{ }</text>
    <!-- Code bubble outline -->
    <path d="M -25,-20 H 25 A 8,8 0 0 1 33,-12 V 12 A 8,8 0 0 1 25,20 H -10 L -22,28 V 20 H -25 A 8,8 0 0 1 -33,12 V -12 A 8,8 0 0 1 -25,-20 Z" stroke="#8b4dc4" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Steaming Coffee Cup (Left Desk) -->
  <g transform="translate(45, 300)" filter="url(#shadow)">
    <!-- Steam -->
    <path d="M 6,-12 C 4,-18 10,-22 8,-28" stroke="#ffbe0b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 12,-10 C 10,-16 16,-20 14,-26" stroke="#ffbe0b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Mug Handle -->
    <path d="M 3,-2 C -4,2 -4,12 3,16" stroke="#0f0b14" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <!-- Mug Body -->
    <path d="M 4,-4 H 22 L 20,20 H 6 Z" fill="#ffbe0b" stroke="#0f0b14" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 8,-1 H 18 V 17 H 8 Z" fill="#ffdf7a" opacity="0.6"/>
  </g>

  <!-- Desk Tiny Plant (Right Desk) -->
  <g transform="translate(250, 305)" filter="url(#shadow)">
    <!-- Pot -->
    <polygon points="6,15 24,15 20,32 10,32" fill="#ff6b9d" stroke="#0f0b14" stroke-width="2"/>
    <!-- Leaves -->
    <path d="M 15,15 C 8,5 4,-2 12,0 C 20,2 24,5 15,15 Z" fill="#2fd6a6" stroke="#0f0b14" stroke-width="1.5"/>
    <path d="M 15,15 C 22,5 26,-2 18,0 C 10,2 6,5 15,15 Z" fill="#148062" stroke="#0f0b14" stroke-width="1.5"/>
    <path d="M 15,15 C 15,0 12,-8 15,-10 C 18,-8 15,0 15,15 Z" fill="#2fd6a6" stroke="#0f0b14" stroke-width="1"/>
  </g>

  <!-- ================= AVATAR / CHARACTER ================= -->
  <g filter="url(#shadow)">
    <!-- Hoodie/Shoulders -->
    <path d="M 105,235 C 105,190 215,190 215,235 L 235,310 H 85 Z" fill="url(#hoodie-grad)" stroke="#8b4dc4" stroke-width="2"/>
    <!-- Hoodie Strings -->
    <path d="M 148,225 L 148,260" stroke="#c4b8d4" stroke-width="2" stroke-linecap="round"/>
    <circle cx="148" cy="262" r="2" fill="#ffbe0b"/>
    <path d="M 172,225 L 172,252" stroke="#c4b8d4" stroke-width="2" stroke-linecap="round"/>
    <circle cx="172" cy="254" r="2" fill="#ffbe0b"/>
    <!-- Hoodie details -->
    <path d="M 108,233 C 108,188 212,188 212,233" fill="none" stroke="#c4b8d4" stroke-width="1" opacity="0.3"/>

    <!-- Neck -->
    <rect x="146" y="172" width="28" height="20" fill="#e4dce8" stroke="#8b4dc4" stroke-width="1.5"/>
    
    <!-- Head -->
    <circle cx="160" cy="148" r="32" fill="#fcf9ff" stroke="#8b4dc4" stroke-width="2"/>
    <circle cx="160" cy="148" r="32" fill="#c4b8d4" opacity="0.2"/>

    <!-- Headphones -->
    <!-- Headband -->
    <path d="M 124,142 C 124,102 196,102 196,142" stroke="#8b4dc4" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 126,140 C 126,106 194,106 194,140" stroke="#c4b8d4" stroke-width="1" fill="none" opacity="0.8"/>
    <!-- Ear Cups -->
    <rect x="119" y="132" width="10" height="28" rx="5" fill="#ffbe0b" stroke="#0f0b14" stroke-width="2"/>
    <rect x="191" y="132" width="10" height="28" rx="5" fill="#ffbe0b" stroke="#0f0b14" stroke-width="2"/>
    <!-- Ear cup rings -->
    <circle cx="124" cy="146" r="3" fill="#0f0b14"/>
    <circle cx="196" cy="146" r="3" fill="#0f0b14"/>

    <!-- Programmer Glasses -->
    <path d="M 136,145 H 184" stroke="#8b4dc4" stroke-width="2"/>
    <!-- Left Lens -->
    <rect x="138" y="138" width="18" height="14" rx="3" fill="#1a1326" stroke="#8b4dc4" stroke-width="2"/>
    <line x1="141" y1="141" x2="147" y2="148" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <!-- Right Lens -->
    <rect x="164" y="138" width="18" height="14" rx="3" fill="#1a1326" stroke="#8b4dc4" stroke-width="2"/>
    <line x1="167" y1="141" x2="173" y2="148" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- ================= FOREGROUND LAPTOP / SCREEN ================= -->
  
  <!-- Desk Base Line -->
  <line x1="20" y1="320" x2="300" y2="320" stroke="#8b4dc4" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Laptop Device -->
  <g filter="url(#shadow)">
    <!-- Screen Bezels -->
    <rect x="70" y="205" width="180" height="110" rx="10" fill="#0f0b14" stroke="#8b4dc4" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Screen Display Area -->
    <rect x="75" y="210" width="170" height="100" rx="6" fill="#140f1d"/>
    <rect x="75" y="210" width="170" height="100" rx="6" fill="url(#screen-glow)"/>
    
    <!-- Code Editor Window Header -->
    <line x1="75" y1="222" x2="245" y2="222" stroke="#251b36" stroke-width="1.5"/>
    <circle cx="82" cy="216" r="2.5" fill="#ff6b9d"/>
    <circle cx="89" cy="216" r="2.5" fill="#ffbe0b"/>
    <circle cx="96" cy="216" r="2.5" fill="#2fd6a6"/>
    <text x="160" y="218" text-anchor="middle" fill="#c4b8d4" font-family="monospace" font-size="7" opacity="0.6">App.tsx</text>

    <!-- Large glowing code tag </ > in center background of editor -->
    <text x="160" y="280" text-anchor="middle" fill="#8b4dc4" font-family="monospace" font-size="28" font-weight="900" opacity="0.25">&lt;/&gt;</text>

    <!-- Code Editor Code Lines -->
    <!-- Line 1: Orange/Gold tag -->
    <rect x="82" y="230" width="40" height="4" rx="1.5" fill="#ffbe0b" opacity="0.9"/>
    <rect x="127" y="230" width="65" height="4" rx="1.5" fill="#c4b8d4" opacity="0.9"/>
    
    <!-- Line 2: Indented Violet block -->
    <rect x="92" y="239" width="80" height="4" rx="1.5" fill="#8b4dc4" opacity="0.9"/>
    <rect x="177" y="239" width="35" height="4" rx="1.5" fill="#2fd6a6" opacity="0.9"/>
    
    <!-- Line 3: Indented Blue block -->
    <rect x="92" y="248" width="50" height="4" rx="1.5" fill="#2fd6a6" opacity="0.9"/>
    <rect x="147" y="248" width="60" height="4" rx="1.5" fill="#ff6b9d" opacity="0.9"/>
    
    <!-- Line 4: Deep Indented tag -->
    <rect x="102" y="257" width="95" height="4" rx="1.5" fill="#c4b8d4" opacity="0.8"/>
    
    <!-- Line 5: Closing tags -->
    <rect x="92" y="266" width="35" height="4" rx="1.5" fill="#8b4dc4" opacity="0.9"/>
    <rect x="82" y="275" width="20" height="4" rx="1.5" fill="#ffbe0b" opacity="0.9"/>
    
    <!-- Interactive output preview floating block (right of editor) -->
    <g transform="translate(195, 255)" opacity="0.95">
      <rect x="0" y="0" width="45" height="45" rx="4" fill="#0f0b14" stroke="#2fd6a6" stroke-width="1.5"/>
      <circle cx="22.5" cy="18" r="10" stroke="#2fd6a6" stroke-width="1" fill="none"/>
      <!-- Small graph spikes -->
      <path d="M 5,38 L 12,30 L 18,35 L 25,25 L 32,32 L 40,15" stroke="#2fd6a6" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Laptop Base / Keyboard -->
    <polygon points="50,315 270,315 292,332 28,332" fill="#0f0b14" stroke="#8b4dc4" stroke-width="2" stroke-linejoin="round"/>
    <!-- Keyboard details (sketch lines) -->
    <line x1="65" y1="320" x2="255" y2="320" stroke="#251b36" stroke-width="2"/>
    <line x1="60" y1="324" x2="260" y2="324" stroke="#251b36" stroke-width="2"/>
    <!-- Touchpad -->
    <rect x="135" y="326" width="50" height="5" rx="1.5" fill="#251b36"/>
  </g>

  <!-- ================= LABELS & TEXT ================= -->
  <!-- Developer Label text -->
  <text x="160" y="375" text-anchor="middle" fill="#8b4dc4" font-family="monospace" font-size="13" font-weight="900" letter-spacing="5">DEVELOPER</text>
  <text x="160" y="387" text-anchor="middle" fill="#c4b8d4" font-family="sans-serif" font-size="9" opacity="0.7" letter-spacing="1">CLEAN CODE &amp; SHARP UX</text>

</svg>
